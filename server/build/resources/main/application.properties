# Server Configuration
server.port=8081

# Keycloak Configuration
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/keycloak-demo
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8080/realms/keycloak-demo/protocol/openid_connect/certs

# Keycloak Adapter Configuration
keycloak.realm=keycloak-demo
keycloak.auth-server-url=http://localhost:8080
keycloak.resource=spring-boot-client
keycloak.public-client=false
keycloak.bearer-only=true

# CORS Configuration
keycloak.cors=true

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.org.keycloak=DEBUG
logging.level.com.keycloakdemo=DEBUG
